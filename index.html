<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocador de Acordes Bossa 80</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .chord-grid {
            display: grid;
            grid-template-columns: 60px repeat(6, 1fr);
            gap: 4px;
        }

        .chord-btn {
            transition: all 0.2s;
        }

        .chord-btn:active {
            transform: scale(0.95);
        }

        .measure-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .sequence-item {
            animation: fadeIn 0.3s ease-out;
            aspect-ratio: 2 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        input[type=range] {
            accent-color: #38bdf8;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-6 flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">Bossa Studio</h1>
                <p class="text-slate-400 text-sm italic">Andamento: <span id="bpm-display">90</span> BPM | 2/4 | Exportação XML Ativa</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-4 bg-slate-800 p-3 rounded-xl shadow-lg border border-slate-700">
                <!-- Controle de BPM -->
                <div class="flex flex-col px-2 border-r border-slate-700 pr-4">
                    <label class="text-[10px] uppercase text-slate-500 font-bold mb-1">Andamento</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="bpm-slider" min="60" max="140" value="90" class="w-20 md:w-28 h-2 bg-slate-900 rounded-lg appearance-none cursor-pointer">
                        <span class="text-sm font-mono text-sky-400 w-6 text-center">90</span>
                    </div>
                </div>

                <!-- Controle de Reverb -->
                <div class="flex flex-col px-2 border-r border-slate-700 pr-4">
                    <label class="text-[10px] uppercase text-slate-500 font-bold mb-1">Reverb Acordes</label>
                    <div class="flex items-center gap-3">
                        <input type="range" id="reverb-slider" min="0" max="100" value="30" class="w-20 md:w-28 h-2 bg-slate-900 rounded-lg appearance-none cursor-pointer">
                        <span class="text-sm font-mono text-sky-400 w-6 text-center">30</span>
                    </div>
                </div>

                <div class="px-2 text-center md:text-left border-r border-slate-700 pr-4">
                    <span class="block text-[10px] uppercase text-slate-500 font-bold leading-none">Status</span>
                    <span id="status-text" class="text-sm text-emerald-400 font-medium tracking-tight">Pronto</span>
                </div>
                
                <div class="flex gap-2">
                    <button id="play-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-all shadow-lg shadow-emerald-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                        </svg>
                        Tocar
                    </button>
                    <button id="stop-btn" class="hidden bg-rose-500 hover:bg-rose-600 text-white px-6 py-2 rounded-lg font-bold transition-all">
                        Parar
                    </button>
                    <button id="export-xml-btn" class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg font-bold border border-sky-400 transition-colors shadow-lg shadow-sky-500/20">
                        XML
                    </button>
                    <button id="clear-btn" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-4 py-2 rounded-lg font-bold border border-slate-600 transition-colors">
                        Limpar
                    </button>
                </div>
            </div>
        </header>

        <main class="flex flex-col gap-8">
            <section class="w-full">
                <div id="sequence-list" class="measure-grid min-h-[140px] bg-slate-900/80 border-2 border-slate-800 rounded-xl p-4 overflow-y-auto max-h-[400px]">
                    <p id="empty-msg" class="col-span-4 text-slate-600 text-sm text-center py-10">Monte sua sequência (4 compassos por linha).</p>
                </div>
            </section>

            <section class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 shadow-inner">
                <div class="chord-grid min-w-[700px]">
                    <div class="p-2"></div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">maj7</div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">9</div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">7(b9)</div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">m7</div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">m7(b5)</div>
                    <div class="text-center font-bold text-slate-400 text-[11px] uppercase py-2">dim7</div>
                    <div id="grid-container" class="contents"></div>
                </div>
            </section>
        </main>

        <footer class="mt-12 pt-6 border-t border-slate-800 text-slate-600 text-[11px] flex justify-between items-center">
            <p>GitHub: glauberlasantiago.github.io/TocadorDeAcordesBossa80/</p>
            <div id="preloader-status" class="text-[10px] text-slate-500 italic font-mono uppercase">Audio Engine: Active</div>
        </footer>
    </div>

    <script>
        // --- CORE AUDIO ENGINE (WEB AUDIO API) ---
        let audioCtx = null;
        const audioBuffers = new Map();
        let masterGain = null;
        let reverbNode = null;
        let reverbWetGain = null;

        async function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);

                reverbNode = audioCtx.createConvolver();
                reverbWetGain = audioCtx.createGain();
                
                reverbNode.buffer = createImpulseResponse(2.0, 3.0);
                
                reverbNode.connect(reverbWetGain);
                reverbWetGain.connect(masterGain);
                
                updateReverbLevel(document.getElementById('reverb-slider').value);

                document.getElementById('preloader-status').innerText = "Audio Engine: Initialized";
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
        }

        function createImpulseResponse(duration, decay) {
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * duration;
            const impulse = audioCtx.createBuffer(2, length, sampleRate);
            const left = impulse.getChannelData(0);
            const right = impulse.getChannelData(1);

            for (let i = 0; i < length; i++) {
                const n = i / length;
                const value = (Math.random() * 2 - 1) * Math.pow(1 - n, decay);
                left[i] = value;
                right[i] = value;
            }
            return impulse;
        }

        function updateReverbLevel(value) {
            if (reverbWetGain) {
                reverbWetGain.gain.setTargetAtTime(value / 65, audioCtx.currentTime, 0.02);
            }
        }

        async function loadSound(url) {
            if (audioBuffers.has(url)) return audioBuffers.get(url);
            try {
                const response = await fetch(url);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                audioBuffers.set(url, audioBuffer);
                return audioBuffer;
            } catch (e) {
                console.error("Audio Load Error:", url);
                return null;
            }
        }

        // --- MUSICAL LOGIC ---
        let BPM = 90; 
        let MEASURE_DURATION = (60 / BPM) * 2; 

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const types = [
            { label: 'maj7', suffix: 'maj7', xml: 'major-seventh' },
            { label: '9', suffix: '9', xml: 'dominant-ninth' },
            { label: '7(b9)', suffix: '7b9', xml: 'dominant' }, // Tratado manualmente no degree
            { label: 'm7', suffix: 'm7', xml: 'minor-seventh' },
            { label: 'm7(b5)', suffix: 'm7b5', xml: 'half-diminished' },
            { label: 'dim7', suffix: 'dim7', xml: 'diminished-seventh' }
        ];

        let sequence = [];
        let isPlaying = false;
        let activeNodes = []; 
        let playbackIntervals = [];

        const gridContainer = document.getElementById('grid-container');
        const sequenceList = document.getElementById('sequence-list');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const exportXmlBtn = document.getElementById('export-xml-btn');
        const statusText = document.getElementById('status-text');
        const bpmSlider = document.getElementById('bpm-slider');
        const reverbSlider = document.getElementById('reverb-slider');
        const bpmDisplay = document.getElementById('bpm-display');

        bpmSlider.addEventListener('input', (e) => {
            BPM = parseInt(e.target.value);
            MEASURE_DURATION = (60 / BPM) * 2;
            bpmDisplay.innerText = BPM;
            bpmSlider.nextElementSibling.innerText = BPM;
        });

        reverbSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            reverbSlider.nextElementSibling.innerText = val;
            updateReverbLevel(val);
        });

        notes.forEach(note => {
            const labelContainer = document.createElement('div');
            labelContainer.className = 'flex items-center justify-center font-bold text-sky-500 bg-slate-900/40 rounded-lg text-sm border border-slate-700/50';
            labelContainer.innerText = note;
            gridContainer.appendChild(labelContainer);

            types.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'chord-btn p-3 bg-slate-700 hover:bg-sky-600 text-white rounded-lg text-[13px] font-semibold border-b-2 border-slate-900 active:translate-y-0.5';
                btn.innerText = `${note}${type.label}`;
                
                const fileName = formatFileName(note, type.suffix);
                btn.onclick = async () => {
                    await initAudioContext();
                    addChord(note, type, fileName);
                };
                gridContainer.appendChild(btn);
            });
        });

        function formatFileName(note, suffix) {
            return `${note.toLowerCase().replace('#', 's')}${suffix}.mp3`;
        }

        async function addChord(note, typeObj, file) {
            if (isPlaying) return;
            statusText.innerText = "Preparando...";
            const buffer = await loadSound(file);
            if (buffer) {
                sequence.push({ 
                    label: note + typeObj.label, 
                    note: note,
                    type: typeObj,
                    file: file, 
                    buffer: buffer 
                });
                statusText.innerText = "Pronto";
                renderSequence();
            } else {
                statusText.innerText = "Erro no .mp3";
            }
        }

        function renderSequence() {
            sequenceList.innerHTML = '';
            if (sequence.length === 0) {
                sequenceList.innerHTML = '<p class="col-span-4 text-slate-600 text-sm text-center py-10">Monte sua sequência...</p>';
                return;
            }
            sequence.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'sequence-item bg-slate-800 border-r-4 border-slate-600 rounded-md shadow-lg group cursor-pointer hover:bg-slate-700 transition-all';
                div.id = `measure-${index}`;
                div.innerHTML = `
                    <span class="absolute top-1 left-2 text-[10px] text-slate-500 font-mono">${index + 1}</span>
                    <span class="text-xl font-bold text-white tracking-tight">${item.label}</span>
                `;
                div.onclick = () => { if(!isPlaying) { sequence.splice(index, 1); renderSequence(); } };
                sequenceList.appendChild(div);
            });
        }

        async function playSequence() {
            if (sequence.length === 0 || isPlaying) return;
            
            isPlaying = true;
            togglePlayUI(true);
            statusText.innerText = "Sincronizando...";

            const drumBuffer = await loadSound('bossa80.mp3');
            const scheduleStart = audioCtx.currentTime + 0.1;
            const totalDuration = sequence.length * MEASURE_DURATION;

            if (drumBuffer) {
                const drumSource = audioCtx.createBufferSource();
                drumSource.buffer = drumBuffer;
                drumSource.loop = true;
                const drumGain = audioCtx.createGain();
                drumSource.connect(drumGain);
                drumGain.connect(masterGain);
                drumGain.gain.setValueAtTime(0, scheduleStart);
                drumGain.gain.linearRampToValueAtTime(1, scheduleStart + 0.05);
                drumSource.start(scheduleStart);
                drumSource.stop(scheduleStart + totalDuration);
                activeNodes.push({source: drumSource, gain: drumGain});
            }

            sequence.forEach((item, i) => {
                const startTime = scheduleStart + (i * MEASURE_DURATION);
                const endTime = startTime + MEASURE_DURATION + 0.3; 

                const source = audioCtx.createBufferSource();
                source.buffer = item.buffer;

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(1, startTime + 0.015); 
                gain.gain.setValueAtTime(1, startTime + MEASURE_DURATION);
                gain.gain.linearRampToValueAtTime(0, endTime);

                source.connect(gain);
                gain.connect(masterGain);
                if (reverbNode) gain.connect(reverbNode);

                source.start(startTime);
                source.stop(endTime + 0.5); 

                activeNodes.push({source, gain});

                const visualDelay = (startTime - audioCtx.currentTime) * 1000;
                const visualTimer = setTimeout(() => {
                    updateVisualHighlight(i);
                }, visualDelay);
                playbackIntervals.push(visualTimer);
            });

            const finalTimer = setTimeout(stopPlayback, (scheduleStart + totalDuration - audioCtx.currentTime) * 1000);
            playbackIntervals.push(finalTimer);
            statusText.innerText = "Tocando...";
        }

        function updateVisualHighlight(index) {
            document.querySelectorAll('.sequence-item').forEach(el => {
                el.classList.remove('ring-4', 'ring-emerald-400', 'bg-emerald-900/40', 'scale-105', 'z-10');
            });
            const active = document.getElementById(`measure-${index}`);
            if (active) {
                active.classList.add('ring-4', 'ring-emerald-400', 'bg-emerald-900/40', 'scale-105', 'z-10');
                active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function stopPlayback() {
            isPlaying = false;
            activeNodes.forEach(node => {
                try { 
                    node.gain.gain.cancelScheduledValues(audioCtx.currentTime);
                    node.gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    setTimeout(() => node.source.stop(), 100);
                } catch(e) {}
            });
            activeNodes = [];
            playbackIntervals.forEach(t => clearTimeout(t));
            playbackIntervals = [];
            updateVisualHighlight(-1);
            togglePlayUI(false);
        }

        function togglePlayUI(playing) {
            if (playing) {
                playBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                bpmSlider.disabled = true; 
                bpmSlider.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                playBtn.classList.remove('hidden');
                stopBtn.classList.add('hidden');
                statusText.innerText = "Pronto";
                bpmSlider.disabled = false;
                bpmSlider.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- EXPORTAR MUSICXML ---
        function exportToXML() {
            if (sequence.length === 0) return;

            let xml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">
<score-partwise version="3.1">
  <work><work-title>Bossa 80 Sequence</work-title></work>
  <part-list>
    <score-part id="P1"><part-name>Piano</part-name></score-part>
  </part-list>
  <part id="P1">`;

            sequence.forEach((chord, index) => {
                if (index % 4 === 0) {
                    xml += `\n    <measure number="${(index / 4) + 1}">`;
                    if (index === 0) {
                        xml += `\n      <attributes>
        <divisions>1</divisions>
        <key><fifths>0</fifths></key>
        <time><beats>2</beats><beat-type>4</beat-type></time>
        <clef><sign>G</sign><line>2</line></clef>
      </attributes>`;
                    }
                }

                // Processar Nota (Root)
                let step = chord.note.charAt(0);
                let alter = chord.note.includes('#') ? 1 : 0;

                xml += `\n      <harmony>
        <root>
          <root-step>${step}</root-step>
          ${alter !== 0 ? `<root-alter>${alter}</root-alter>` : ''}
        </root>
        <kind>${chord.type.xml}</kind>`;

                // Tratamento especial para 7(b9) no MusicXML
                if (chord.type.label === '7(b9)') {
                    xml += `\n        <degree>
          <degree-value>9</degree-value>
          <degree-alter>-1</degree-alter>
          <degree-type>add</degree-type>
        </degree>`;
                }

                xml += `\n      </harmony>`;
                xml += `\n      <note><rest/><duration>2</duration><voice>1</voice></note>`;

                if ((index + 1) % 4 === 0 || (index + 1) === sequence.length) {
                    xml += `\n    </measure>`;
                }
            });

            xml += `\n  </part>\n</score-partwise>`;

            const blob = new Blob([xml], { type: 'application/vnd.recordare.musicxml+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bossa80_sequence.musicxml';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        playBtn.addEventListener('click', async () => {
            await initAudioContext();
            playSequence();
        });
        stopBtn.addEventListener('click', stopPlayback);
        exportXmlBtn.addEventListener('click', exportToXML);
        clearBtn.addEventListener('click', () => {
            if (isPlaying) return;
            sequence = [];
            renderSequence();
        });

    </script>
</body>
</html>
